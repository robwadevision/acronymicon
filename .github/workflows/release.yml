name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Update manifest version from tag
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          node -e "
            const fs = require('fs');
            const version = process.env.VERSION.replace(/^v/, '');
            const m = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            m.version = version;
            fs.writeFileSync('manifest.json', JSON.stringify(m, null, 2) + '\n');
          "

      - name: Remove constants.js from production manifest
        run: |
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            m.content_scripts.forEach(cs => {
              cs.js = cs.js.filter(f => f !== 'src/constants.js');
            });
            fs.writeFileSync('manifest.json', JSON.stringify(m, null, 2) + '\n');
          "

      - name: Inject GA4 credentials into analytics.js
        env:
          GA4_MEASUREMENT_ID: ${{ secrets.GA4_MEASUREMENT_ID }}
          GA4_API_SECRET: ${{ secrets.GA4_API_SECRET }}
        run: |
          node -e "
            const fs = require('fs');
            let src = fs.readFileSync('src/analytics.js', 'utf8');
            src = src.replace(/const MEASUREMENT_ID = .+/, 'const MEASUREMENT_ID = ' + JSON.stringify(process.env.GA4_MEASUREMENT_ID) + ';');
            src = src.replace(/const API_SECRET = .+/, 'const API_SECRET = ' + JSON.stringify(process.env.GA4_API_SECRET) + ';');
            src = src.replace(/const DEBUG = .+/, 'const DEBUG = false;');
            fs.writeFileSync('src/analytics.js', src);
          "

      - name: Build zip
        run: |
          zip -r acronymicon-${{ steps.version.outputs.VERSION }}.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude "*.DS_Store" \
            --exclude "*.md" \
            --exclude "docs/*" \
            --exclude "scripts/*" \
            --exclude "src/constants.js" \
            --exclude "src/constants.example.js"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: acronymicon-${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true
