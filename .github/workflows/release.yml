name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Create constants.js from secrets
        run: |
          VERSION_NUM="${{ steps.version.outputs.VERSION }}"
          VERSION_NUM="${VERSION_NUM#v}"
          cat > src/constants.js << EOF
          const versionNumber = "${VERSION_NUM}";
          const AcronymConfig = {
            version: "${VERSION_NUM}",
            measurementId: "${{ secrets.GA4_MEASUREMENT_ID }}",
            apiSecret: "${{ secrets.GA4_API_SECRET }}",
            debug: false,
          };
          EOF

      - name: Sync version to manifest.json
        run: node scripts/sync-version.js

      - name: Build zip
        run: |
          zip -r acronymicon-${{ steps.version.outputs.VERSION }}.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude "*.DS_Store" \
            --exclude "*.md" \
            --exclude "docs/*" \
            --exclude "scripts/*"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: acronymicon-${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true
