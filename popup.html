<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acronymicon</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">

    <header class="header">
      <div class="logo">
        <div class="logo-icon" aria-hidden="true">Aa</div>
        <span class="logo-name">Acronymicon</span>
      </div>
      <div class="lang-badge" id="lang-badge" title="Dictionary language">
        <svg class="lang-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        <span id="lang-label">EN</span>
      </div>
    </header>

    <div class="toggle-row">
      <div>
        <div class="toggle-label">Active on this page</div>
        <div class="toggle-sub" id="toggle-sub">Scanning for acronyms</div>
      </div>
      <label class="switch" aria-label="Toggle Acronymicon">
        <input type="checkbox" id="main-toggle" checked />
        <span class="switch-track"></span>
      </label>
    </div>

    <div class="divider"></div>

    <div class="stats">
      <div class="stat-item">
        <div class="stat-value" id="stat-identified">—</div>
        <div class="stat-label">Identified</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="stat-defined">—</div>
        <div class="stat-label">Defined</div>
      </div>
    </div>
    <div class="stat-note" id="stat-note"></div>
    <div class="stat-dict" id="stat-dict"></div>

    <div class="divider"></div>

    <div class="footer">
      <a href="https://github.com/robwadevision/acronymicon" target="_blank" class="footer-link">GitHub ↗</a>
      <a href="https://robwadevision.github.io/acronymicon/" target="_blank" class="footer-link">About ↗</a>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
