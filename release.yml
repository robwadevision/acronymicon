name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build zip
        run: |
          zip -r acronymicon-${{ steps.version.outputs.VERSION }}.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude "*.DS_Store" \
            --exclude "*.md"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: acronymicon-${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true
